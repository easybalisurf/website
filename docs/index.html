<style>
  *{box-sizing:border-box}

  .caustic-wrap{position:absolute;inset:-30%;pointer-events:none;filter:blur(18px) contrast(1.4);mix-blend-mode:screen;opacity:.1}
  .caustic{position:absolute;background:radial-gradient(ellipse 50% 40% at center,rgba(80,220,235,.55),transparent 65%)}
  @keyframes caust1{0%{transform:translate(0,0) skew(0deg,0deg) scale(1)}20%{transform:translate(6%,-4%) skew(4deg,2deg) scale(1.2)}40%{transform:translate(-3%,5%) skew(-3deg,3deg) scale(0.9)}60%{transform:translate(4%,3%) skew(2deg,-3deg) scale(1.15)}80%{transform:translate(-5%,-3%) skew(-4deg,1deg) scale(0.95)}100%{transform:translate(0,0) skew(0deg,0deg) scale(1)}}
  @keyframes caust2{0%{transform:translate(0,0) skew(0deg,0deg) scale(1.1)}25%{transform:translate(-5%,4%) skew(-3deg,-2deg) scale(0.9)}50%{transform:translate(4%,-5%) skew(3deg,2deg) scale(1.2)}75%{transform:translate(-4%,-3%) skew(-2deg,3deg) scale(1)}100%{transform:translate(0,0) skew(0deg,0deg) scale(1.1)}}
  @keyframes caust3{0%{transform:translate(0,0) scale(1)}30%{transform:translate(5%,5%) scale(1.15)}60%{transform:translate(-6%,-4%) scale(0.92)}100%{transform:translate(0,0) scale(1)}}
  @keyframes ctaShimmer{0%{background-position:0% 50%}100%{background-position:200% 50%}}
  @keyframes ctaRipple{0%{transform:scale(0.4);opacity:.5}100%{transform:scale(2.6);opacity:0}}
  @keyframes iconBob{0%,100%{transform:translateY(-3px) rotate(-2deg)}50%{transform:translateY(3px) rotate(2deg)}}
</style>
