<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>

<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;500;600;700&amp;family=Audiowide&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#0a0e0d;color:#FFFFFFBD;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:#61FFD0;text-decoration:none}
  a:hover{color:#8affe0}
  ::selection{background:#61FFD0;color:#08100d}
  @keyframes floatUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
</style>
</helmet>

<div style="position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;overflow:hidden">

  <div style="position:absolute;inset:-10% -10%;background:radial-gradient(circle at 30% 25%,rgba(97,255,208,.14),transparent 55%),radial-gradient(circle at 75% 80%,rgba(63,217,230,.14),transparent 55%);pointer-events:none"></div>

  <div style="position:relative;animation:floatUp .8s ease-out both">
    <span style="font-family:'Audiowide',sans-serif;font-weight:400;font-size:clamp(28px,6vw,44px);letter-spacing:.5px">
      <span style="color:#8CFFC1">E</span><span style="color:#8CFFC1">A</span><span style="color:#7FF5C6">S</span><span style="color:#72EBCB">Y</span><span style="color:#65E0D0">B</span><span style="color:#58D6D5">A</span><span style="color:#4BCBDA">L</span><span style="color:#3EC1DF">I</span><span style="color:#31B6E4">.</span><span style="color:#fff">SURF</span>
    </span>
  </div>

  <p style="position:relative;font-family:'Inter',sans-serif;color:#61FFD0;font-size:14px;font-weight:500;letter-spacing:.4px;text-transform:uppercase;margin:28px 0 0;animation:floatUp .9s .1s ease-out both">Coming soon</p>
  <h1 style="position:relative;font-family:'Antonio',sans-serif;font-weight:700;font-size:clamp(28px,5vw,42px);line-height:1.1;letter-spacing:-.5px;color:#fff;margin:14px 0 0;max-width:16ch;animation:floatUp 1s .2s ease-out both">We're waxing up the boards.</h1>
  <p style="position:relative;font-size:16px;line-height:1.7;margin:20px 0 0;max-width:44ch;color:#FFFFFFBD;animation:floatUp 1.1s .3s ease-out both">Certified surf, kite, wing foil and SUP coaching on Bali's best breaks — booking opens shortly.</p>

  <a href="mailto:hello@EasyBali.surf" style="position:relative;display:inline-flex;align-items:center;gap:9px;background:linear-gradient(120deg,#7DFFC4,#61FFD0 42%,#3FD9E6);color:#08100d;font-weight:600;font-size:15px;padding:16px 30px;border-radius:100px;margin-top:36px;animation:floatUp 1.2s .4s ease-out both" style-hover="box-shadow:0 10px 40px rgba(97,255,208,.45)">hello@EasyBali.surf</a>

  <div style="position:relative;display:flex;gap:22px;margin-top:40px;animation:floatUp 1.3s .5s ease-out both">
    <a href="#" style="font-size:14px;color:#FFFFFFBD">Instagram</a>
    <a href="#" style="font-size:14px;color:#FFFFFFBD">TikTok</a>
  </div>
</div>

</x-dc>
</body>
</html>
